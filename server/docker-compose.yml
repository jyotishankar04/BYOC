version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: byoc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-byoc_db}
      POSTGRES_USER: ${POSTGRES_USER:-byoc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-byoc_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-byoc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: byoc-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: byoc-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MH_STORAGE: memory

  # server:
