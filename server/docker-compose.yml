version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: byoc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-byoc_db}
      POSTGRES_USER: ${POSTGRES_USER:-byoc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-byoc_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-byoc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: byoc-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: byoc-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MH_STORAGE: memory

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: byoc-server
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-byoc_user}:${POSTGRES_PASSWORD:-byoc_password}@postgres:5432/${POSTGRES_DB:-byoc_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
