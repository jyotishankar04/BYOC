version: "3.8"

services:
  server:
    image: ghcr.io/jyotishankar04/bringbucket-server:latest
    container_name: byoc-server
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: byoc-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
