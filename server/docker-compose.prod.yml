version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: byoc-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    image: ghcr.io/jyotishankar04/bringbucket-server:latest
    container_name: byoc-server
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Override any Upstash REDIS_URL from .env — use the local Redis container instead
      REDIS_URL: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: byoc-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    restart: unless-stopped

volumes:
  redis_data:
  caddy_data:
  caddy_config:
